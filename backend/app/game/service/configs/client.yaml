client:
  grpc:
    timeout: 10s
    middleware:
      enable_logging: true
      enable_recovery: true
      enable_tracing: true
      enable_validate: true
      enable_circuit_breaker: true
      enable_metadata: true
      auth:
        method: ""
        key: "some_api_key"

  discovery:
    type: nacos
    nacos:
      addr: "127.0.0.1:8848"
      namespace: "public"
      group: "DEFAULT_GROUP"
